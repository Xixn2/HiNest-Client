# Render Blueprint — HiNest API 서버 자동 배포 정의.
#
# 사용 방법:
#   1) Render Dashboard → New → Blueprint → 이 리포 선택
#   2) `sync: false` 로 표시된 env 값은 Dashboard 에서 직접 채워야 함
#      (Supabase 대시보드에서 복사한 값들)
#
# Render Free 주의사항:
#   - 15분 무활동 시 자동 sleep → 다음 요청 시 ~30초 콜드스타트
#   - 월 750시간 제공 (24/7 하나까지 가능)
services:
  - type: web
    name: hinest-api
    runtime: node
    plan: free
    region: singapore       # 한국에서 가장 가까운 Render 리전
    rootDir: server         # 모노레포 — server/ 하위에서 빌드
    # postinstall 에 prisma generate 가 이미 걸려 있으므로 install 만 해도 client 생성됨.
    # 빌드 후 prisma migrate deploy 로 프로덕션 스키마 반영.
    # NODE_ENV=production 때문에 npm install 이 devDependencies 를 스킵 →
    # @types/node, @types/express, typescript, prisma CLI 가 설치 안 돼 tsc 빌드가 터짐.
    # --include=dev 로 명시적으로 devDeps 도 포함시켜야 빌드 가능.
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true        # main 브랜치 push 시 자동 재배포
    envVars:
      - key: NODE_ENV
        value: production
      # Render 컨테이너는 기본이 UTC — HiNest 는 KST 기반 서비스라서 new Date() 로 만든
      # 날짜 문자열(출근/공지/관리자 리포트 등)이 UTC 로 찍히면 0~9시 사이에 하루가 밀림.
      # TZ 를 서울로 고정해 모든 node 날짜 포맷팅이 KST 기준이 되도록.
      - key: TZ
        value: Asia/Seoul
      # Render 는 PORT 를 주입. 서버 코드가 process.env.PORT 를 이미 쓰고 있어 그대로 둠.
      - key: PORT
        value: 10000
      # Supabase 에서 복사 — Dashboard 에서 수동 입력
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: hinest-uploads
      # JWT — Render 가 자동으로 강한 랜덤 값 생성해 세팅.
      - key: JWT_SECRET
        generateValue: true
      # Vercel 배포 후 실제 클라이언트 도메인으로 교체 (예: https://hinest.vercel.app)
      - key: CLIENT_ORIGIN
        sync: false
