name: Reclassify Petmoa QA statuses + assign to 오상민

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  CLUSTER: hinest-prod
  SERVICE: hinest-server
  CONTAINER: server

jobs:
  reclass:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::149536482210:role/github-deploy-hinest
          role-session-name: gha-reclass-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build script
        id: build
        run: |
          cat > u.cjs <<'EOF'
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          (async () => {
            const project = await prisma.project.findFirst({ where: { name: { contains: 'petmoa', mode: 'insensitive' } } });
            if (!project) { console.error('no project'); process.exit(1); }
            const user = await prisma.user.findFirst({ where: { name: { contains: '오상민' } } });
            if (!user) { console.error('no 오상민'); process.exit(1); }
            console.log('user:', user.id, user.name);

            // 담당자 전부 오상민으로.
            const a = await prisma.projectQaItem.updateMany({ where: { projectId: project.id }, data: { assigneeId: user.id } });
            console.log('assignees updated', a.count);

            // 원본 데이터 기준: "테스트 요망" → NEEDS_TEST, "수정필요" → NEEDS_FIX.
            const NEEDS_TEST_TITLES = ['탈퇴시 비활성화 처리'];
            const NEEDS_FIX_TITLES = ['탈퇴한 sns 계정 재가입 불가', '탈퇴해도 그 계정으로 로그인 가능'];

            const t = await prisma.projectQaItem.updateMany({
              where: { projectId: project.id, title: { in: NEEDS_TEST_TITLES } },
              data: { status: 'NEEDS_TEST' },
            });
            console.log('NEEDS_TEST set', t.count);

            const f = await prisma.projectQaItem.updateMany({
              where: { projectId: project.id, title: { in: NEEDS_FIX_TITLES } },
              data: { status: 'NEEDS_FIX' },
            });
            console.log('NEEDS_FIX set', f.count);

            await prisma.$disconnect();
          })().catch(e => { console.error(e); process.exit(1); });
          EOF
          echo "b64=$(gzip -9 -c u.cjs | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Run via ECS RunTask
        env:
          B64: ${{ steps.build.outputs.b64 }}
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          NET=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].networkConfiguration' --output json)
          OVERRIDES=$(jq -cn --arg c "$CONTAINER" --arg b "$B64" '{
            containerOverrides: [{
              name: $c,
              command: ["sh","-c", "echo \($b) | base64 -d | gunzip > /tmp/u.cjs && cd /app && NODE_PATH=/app/node_modules node /tmp/u.cjs"]
            }]
          }')
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEF" --launch-type FARGATE --network-configuration "$NET" --overrides "$OVERRIDES" --region "$AWS_REGION" --query 'tasks[0].taskArn' --output text)
          echo "Started: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION"
          DESC=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION")
          EXIT=$(echo "$DESC" | jq -r --arg c "$CONTAINER" '.tasks[0].containers[] | select(.name==$c) | .exitCode')

          LOG_GROUP=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-group\"" --output text)
          LOG_PREFIX=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-stream-prefix\"" --output text)
          TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
          aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_PREFIX/$CONTAINER/$TASK_ID" --region "$AWS_REGION" --query 'events[*].message' --output text || true

          if [ "$EXIT" != "0" ]; then exit 1; fi
