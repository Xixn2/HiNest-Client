name: Seed Petmoa QA checklist

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  CLUSTER: hinest-prod
  SERVICE: hinest-server
  CONTAINER: server

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::149536482210:role/github-deploy-hinest
          role-session-name: gha-seed-qa-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build inline seed script
        id: build
        run: |
          node -e "
          const fs = require('fs');
          const ts = fs.readFileSync('server/scripts/seedPetmoaQa.ts','utf8');
          const rawMatch = ts.match(/const RAW[^=]*=\s*(\[[\s\S]*?\n\]);/);
          if(!rawMatch){ console.error('RAW not found'); process.exit(1); }
          const RAW = rawMatch[1];
          const script = \`
          const { PrismaClient } = require('@prisma/client');
          const prisma = new PrismaClient();
          const RAW = \${RAW};
          function mapStatus(s){ if(s==='완료')return'DONE'; if(s==='수정필요'||s==='테스트 요망')return'IN_PROGRESS'; return'BUG'; }
          function mapPriority(title,note){ const t=(title+' '+(note||'')).toLowerCase(); if(t.includes('오류')||t.includes('불가')||t.includes('안됨')||t.includes('crash'))return'HIGH'; return'NORMAL'; }
          (async()=>{
            const project = await prisma.project.findFirst({ where:{ name:{ contains:'petmoa', mode:'insensitive' } }, include:{ members:{ orderBy:{ joinedAt:'asc' }, take:1 } } });
            if(!project){ console.error('no project'); process.exit(1); }
            let createdById = project.members[0]?.userId;
            if(!createdById){ const admin = await prisma.user.findFirst({ where:{ OR:[{ superAdmin:true },{ role:'ADMIN' }] }, orderBy:{ createdAt:'asc' } }); createdById = admin?.id; }
            if(!createdById){ console.error('no user'); process.exit(1); }
            const d = await prisma.projectQaItem.deleteMany({ where:{ projectId: project.id } });
            console.log('deleted', d.count);
            await prisma.projectQaItem.createMany({ data: RAW.map((r,i)=>({ projectId: project.id, title: r.title, screen: r.screen||null, note: r.note ? '['+r.section+'] '+r.note : (r.section ? '['+r.section+']' : null), platform:'IOS', status: mapStatus(r.status), priority: mapPriority(r.title, r.note), sortOrder: i+1, createdById })) });
            console.log('seeded', RAW.length);
            await prisma.\\\$disconnect();
          })().catch(e=>{ console.error(e); process.exit(1); });
          \`;
          fs.writeFileSync('seed.cjs', script);
          "
          gzip -9 -c seed.cjs | base64 -w0 > seed.gz.b64
          echo "bytes: $(wc -c < seed.gz.b64)"
          B64=$(cat seed.gz.b64)
          echo "b64=$B64" >> $GITHUB_OUTPUT

      - name: Run one-off seed task via ECS RunTask
        env:
          SEED_B64: ${{ steps.build.outputs.b64 }}
        run: |
          # 현재 running task 의 task definition 과 network config 를 재사용.
          TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          echo "TaskDef: $TASK_DEF"
          NET=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].networkConfiguration' --output json)
          echo "Net: $NET"

          OVERRIDES=$(jq -cn --arg c "$CONTAINER" --arg b "$SEED_B64" '{
            containerOverrides: [{
              name: $c,
              command: ["sh","-c", "echo \($b) | base64 -d | gunzip > /tmp/seed.cjs && node /tmp/seed.cjs"]
            }]
          }')
          echo "Overrides prepared"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "$NET" \
            --overrides "$OVERRIDES" \
            --region "$AWS_REGION" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "Started: $TASK_ARN"

          echo "Waiting for task to stop..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION"

          DESC=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION")
          echo "$DESC" | jq '.tasks[0] | {stopCode, stoppedReason, containers: [.containers[] | {name, exitCode, reason}]}'

          EXIT=$(echo "$DESC" | jq -r --arg c "$CONTAINER" '.tasks[0].containers[] | select(.name==$c) | .exitCode')
          echo "Exit code: $EXIT"

          # CloudWatch logs 가져오기
          LOG_GROUP=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-group\"" --output text)
          LOG_PREFIX=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-stream-prefix\"" --output text)
          TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
          STREAM="$LOG_PREFIX/$CONTAINER/$TASK_ID"
          echo "Log stream: $LOG_GROUP / $STREAM"
          aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$STREAM" --region "$AWS_REGION" --query 'events[*].message' --output text || echo "(no logs)"

          if [ "$EXIT" != "0" ]; then exit 1; fi
