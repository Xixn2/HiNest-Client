name: Seed Petmoa QA checklist

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: server
        run: npm ci && npx prisma generate

      - name: Run seed
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.HINEST_PROD_DATABASE_URL }}
        run: npx tsx scripts/seedPetmoaQa.ts
