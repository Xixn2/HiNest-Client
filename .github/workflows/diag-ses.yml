# SES + 비밀번호 재설정 메일 발송 진단 워크플로우.
# 1) nest.hi-vits.com 도메인 verify 상태
# 2) developer.seojiwan@gmail.com 이메일 verify 상태
# 3) CloudWatch 에서 최근 EMAIL_FALLBACK 마커 + PWD_RESET 관련 로그 추출
#    → SES 가 발송 거부하면 메일 본문(재설정 링크) 이 콘솔로 흘러나옴
name: Diagnose SES + password reset
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECS_CLUSTER: hinest-prod
  ECS_SERVICE: hinest-server
  TASK_FAMILY: hinest-server
  CONTAINER_NAME: server

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::149536482210:role/github-deploy-hinest
          role-session-name: gha-diag-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SES identity verification status
        run: |
          echo "=========== nest.hi-vits.com ==========="
          aws sesv2 get-email-identity \
            --email-identity nest.hi-vits.com \
            --region "$AWS_REGION" \
            --query '{VerifiedForSending: VerifiedForSendingStatus, DKIM: DkimAttributes.Status, DKIMTokens: DkimAttributes.Tokens}' \
            --output json || true

          echo ""
          echo "=========== developer.seojiwan@gmail.com ==========="
          aws sesv2 get-email-identity \
            --email-identity developer.seojiwan@gmail.com \
            --region "$AWS_REGION" \
            --query '{VerifiedForSending: VerifiedForSendingStatus, DKIM: DkimAttributes.Status}' \
            --output json || true

      - name: SES sandbox status
        run: |
          aws sesv2 get-account --region "$AWS_REGION" \
            --query '{Sandbox: ProductionAccessEnabled, SendQuota: SendQuota, EnforcementStatus: EnforcementStatus}' \
            --output json

      - name: Recent EMAIL_FALLBACK + PWD_RESET logs (last 15min)
        run: |
          LOG_GROUP=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --region "$AWS_REGION" \
            --query "taskDefinition.containerDefinitions[?name=='$CONTAINER_NAME'].logConfiguration.options.\"awslogs-group\"" \
            --output text)
          echo "Log group: $LOG_GROUP"

          START=$(( $(date -u +%s%3N) - 15*60*1000 ))
          echo ""
          echo "=========== filter: EMAIL_FALLBACK ==========="
          aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time "$START" \
            --filter-pattern "EMAIL_FALLBACK" \
            --region "$AWS_REGION" \
            --query 'events[*].message' --output text || echo "(no logs)"

          echo ""
          echo "=========== filter: 비밀번호 재설정 본문 (reset-password URL 포함) ==========="
          aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time "$START" \
            --filter-pattern "reset-password" \
            --region "$AWS_REGION" \
            --query 'events[*].message' --output text || echo "(no logs)"

          echo ""
          echo "=========== filter: SES 발송 시도 에러 ==========="
          aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time "$START" \
            --filter-pattern "?SES ?MessageRejected ?ses:SendEmail" \
            --region "$AWS_REGION" \
            --query 'events[*].message' --output text || echo "(no logs)"

          echo ""
          echo "=========== filter: AuditLog PWD_RESET_REQUEST (서버가 받았는지) ==========="
          aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time "$START" \
            --filter-pattern "PWD_RESET" \
            --region "$AWS_REGION" \
            --query 'events[*].message' --output text || echo "(no logs)"
