          function statusOf(s){
            if(s==='완료') return 'DONE';
            if(s==='수정필요') return 'NEEDS_FIX';
            if(s==='테스트 요망') return 'NEEDS_TEST';
            return 'BUG';
          }
          function priorityOf(title, note){
            const t = (title+' '+(note||'')).toLowerCase();
            if(t.includes('오류')||t.includes('불가')||t.includes('안됨')||t.includes('누락')) return 'HIGH';
            return 'NORMAL';
          }
          function parseDue(s){
            if(!s) return null;
            const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
            if(!m) return null;
            const dd = +m[1], mm = +m[2], yyyy = +m[3];
            return new Date(Date.UTC(yyyy, mm-1, dd));
          }
          function norm(s){
            return (s||'').replace(/\s+/g,'').toLowerCase();
          }

