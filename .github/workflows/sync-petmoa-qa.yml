            console.log('existing count', existing.length);

            // 기존 아이템을 normalized title 기준으로 lookup.
            // 중복이 많아 (예: "앨범 메뉴 - 복사 불가") screen 까지 함께 고려 — screen 은 note 의 [섹션] prefix 로 유추 어려워서
            // 제목만 정규화해서 매칭하되, 한 번 쓴 건 소진 (first-come-first-served).
            const byTitle = new Map();
            for(const it of existing){
              const k = norm(it.title);
              if(!byTitle.has(k)) byTitle.set(k, []);
              byTitle.get(k).push(it);
            }

            let updated = 0, inserted = 0;
            let order = existing.length + 1;

            for(const row of RAW){
              const [screen, section, title, status, note, assignee, due] = row;
              if(!title) continue;

              const key = norm(title);
              const bucket = byTitle.get(key);
              const match = bucket && bucket.length ? bucket.shift() : null;

              const finalNote = note
                ? (section ? '['+section+'] '+note : note)
                : (section ? '['+section+']' : null);

              if(match){
                // 기존 항목: 제목/메모만 업데이트.
                await prisma.projectQaItem.update({
                  where: { id: match.id },
                  data: { title, note: finalNote, screen: screen || match.screen },
                });
                updated++;
              } else {
                // 신규: 전체 필드.
                await prisma.projectQaItem.create({
                  data: {
                    projectId: project.id,
                    title,
                    screen: screen || null,
                    note: finalNote,
                    platform: 'IOS',
                    status: statusOf(status),
                    priority: priorityOf(title, note),
                    sortOrder: order++,
                    assigneeId: assigneeIdOf(assignee),
                    dueDate: parseDue(due),
                    createdById: lee.id,
                  },
                });
                inserted++;
              }
            }

            console.log('updated', updated, 'inserted', inserted);
            await prisma.$disconnect();
          })().catch(e => { console.error(e); process.exit(1); });
          EOF
          echo "b64=$(gzip -9 -c s.cjs | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Run via ECS RunTask
        env:
          B64: ${{ steps.build.outputs.b64 }}
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].taskDefinition' --output text)
          NET=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --query 'services[0].networkConfiguration' --output json)
          OVERRIDES=$(jq -cn --arg c "$CONTAINER" --arg b "$B64" '{
            containerOverrides: [{
              name: $c,
              command: ["sh","-c", "echo \($b) | base64 -d | gunzip > /tmp/s.cjs && cd /app && NODE_PATH=/app/node_modules node /tmp/s.cjs"]
            }]
          }')
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" --task-definition "$TASK_DEF" --launch-type FARGATE --network-configuration "$NET" --overrides "$OVERRIDES" --region "$AWS_REGION" --query 'tasks[0].taskArn' --output text)
          echo "Started: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION"
          DESC=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION")
          EXIT=$(echo "$DESC" | jq -r --arg c "$CONTAINER" '.tasks[0].containers[] | select(.name==$c) | .exitCode')

          LOG_GROUP=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-group\"" --output text)
          LOG_PREFIX=$(aws ecs describe-task-definition --task-definition "$TASK_DEF" --region "$AWS_REGION" --query "taskDefinition.containerDefinitions[?name=='$CONTAINER'].logConfiguration.options.\"awslogs-stream-prefix\"" --output text)
          TASK_ID=$(echo "$TASK_ARN" | awk -F/ '{print $NF}')
          aws logs get-log-events --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_PREFIX/$CONTAINER/$TASK_ID" --region "$AWS_REGION" --query 'events[*].message' --output text || true

          if [ "$EXIT" != "0" ]; then exit 1; fi
